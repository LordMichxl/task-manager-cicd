services:
  # Application Laravel (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-manager-cicd-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - task-manager-cicd
    depends_on:
      - mysql
      - redis
    healthcheck:
      test: ["CMD", "php", "-r", "$$c=@fsockopen('127.0.0.1',9000);if($$c){fclose($$c);exit(0);}exit(1);"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 120s

  # Serveur Web Nginx (démarre avec l'app ; en cas de 502, attendre 1–2 min que PHP-FPM soit prêt)
  nginx:
    image: nginx:alpine
    container_name: task-manager-cicd-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    networks:
      - task-manager-cicd
    depends_on:
      - app

  # Base de données MySQL
  mysql:
    image: mysql:8.0
    container_name: task-manager-cicd-mysql-v1
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: task_manager_password
      MYSQL_DATABASE: ${DB_DATABASE:-task_manager_cicd}
      MYSQL_USER: task_manager
      MYSQL_PASSWORD: task_manager_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3306:3306"
    networks:
      - task-manager-cicd
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cache Redis
  redis:
    image: redis:7-alpine
    container_name: task-manager-cicd-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - task-manager-cicd
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

networks:
  task-manager-cicd:
    driver: bridge

volumes:
  mysql_data: